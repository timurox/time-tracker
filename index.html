<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: 'Inter', -apple-system, sans-serif; }
    * { box-sizing: border-box; }
    body { background: #ece8e0; }
    body.dark { background: #0e0e10; }
    button { font-family: inherit; }
    button:focus { outline: none; }
    input::placeholder { color: rgba(128,128,128,0.6); }
    @keyframes tt-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.5); }
    }
    @keyframes tt-fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes tt-slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes tt-spin { to { transform: rotate(360deg); } }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="app-store.jsx"></script>
  <script type="text/babel" src="app-views.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Auth screen (magic link) ──
    function AuthScreen({ auth, theme: t, dark }) {
      const [email, setEmail] = useState("");
      const [sent, setSent] = useState(false);
      const [error, setError] = useState(null);
      const [loading, setLoading] = useState(false);

      const submit = async (e) => {
        e.preventDefault();
        if (!email.trim()) return;
        setLoading(true); setError(null);
        const { error } = await auth.signInWithEmail(email.trim());
        setLoading(false);
        if (error) setError(error.message);
        else setSent(true);
      };

      return (
        <div style={{
          minHeight: "100vh", background: t.bg, color: t.text,
          display: "flex", alignItems: "center", justifyContent: "center",
          padding: "24px 16px",
        }}>
          <div style={{ width: "100%", maxWidth: 380 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 32 }}>
              <span style={{ width: 12, height: 12, borderRadius: 2, background: t.accent }} />
              <span style={{ fontSize: 14, fontWeight: 600 }}>Time Tracker</span>
            </div>

            {!sent ? (
              <>
                <h1 style={{ margin: 0, fontSize: 32, fontWeight: 700, letterSpacing: "-0.03em", lineHeight: 1.05 }}>
                  Sign in
                </h1>
                <p style={{ fontSize: 14, color: t.muted, marginTop: 8, marginBottom: 24, lineHeight: 1.5 }}>
                  Enter your email and we'll send you a magic link. No password required.
                </p>
                <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  <input
                    type="email"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    placeholder="you@example.com"
                    autoFocus
                    style={{
                      background: t.paper, border: `1px solid ${t.line}`,
                      borderRadius: 10, padding: "13px 14px",
                      fontSize: 14, color: t.text, fontFamily: "inherit", outline: "none",
                    }}
                  />
                  <button type="submit" disabled={loading} style={{
                    height: 46, border: "none", borderRadius: 10,
                    background: t.accent, color: "#fff",
                    fontSize: 14, fontWeight: 600, cursor: loading ? "wait" : "pointer",
                    fontFamily: "inherit", opacity: loading ? 0.7 : 1,
                  }}>
                    {loading ? "Sending…" : "Send magic link"}
                  </button>
                  {error && (
                    <div style={{ fontSize: 12, color: "#d44", marginTop: 4 }}>{error}</div>
                  )}
                </form>
              </>
            ) : (
              <>
                <h1 style={{ margin: 0, fontSize: 28, fontWeight: 700, letterSpacing: "-0.03em" }}>Check your email</h1>
                <p style={{ fontSize: 14, color: t.muted, marginTop: 12, lineHeight: 1.5 }}>
                  We sent a magic link to <strong style={{ color: t.text }}>{email}</strong>.
                  Click it to sign in. You can close this tab.
                </p>
                <button onClick={() => { setSent(false); setEmail(""); }} style={{
                  marginTop: 16, height: 38, padding: "0 16px", border: `1px solid ${t.line}`,
                  borderRadius: 8, background: "transparent", color: t.text,
                  fontSize: 13, fontWeight: 500, cursor: "pointer", fontFamily: "inherit",
                }}>Use a different email</button>
              </>
            )}
          </div>
        </div>
      );
    }

    // ── Loading screen ──
    function LoadingScreen({ theme: t }) {
      return (
        <div style={{
          minHeight: "100vh", background: t.bg, color: t.text,
          display: "flex", alignItems: "center", justifyContent: "center",
        }}>
          <div style={{
            width: 24, height: 24, border: `2.5px solid ${t.line}`,
            borderTopColor: t.accent, borderRadius: "50%",
            animation: "tt-spin 0.8s linear infinite",
          }} />
        </div>
      );
    }

    function App() {
      const auth = useAuth();
      const [theme, setThemeMode] = useState(() => localStorage.getItem("tt_theme") || "light");
      const dark = theme === "dark";
      const t = useTheme(dark);

      useEffect(() => {
        document.body.classList.toggle("dark", dark);
        localStorage.setItem("tt_theme", theme);
      }, [theme, dark]);

      // Auth still loading
      if (auth.session === undefined) return <LoadingScreen theme={t} />;
      // Not signed in
      if (!auth.user) return <AuthScreen auth={auth} theme={t} dark={dark} />;

      return <SignedInApp user={auth.user} auth={auth} theme={t} dark={dark} themeMode={theme} setThemeMode={setThemeMode} />;
    }

    function SignedInApp({ user, auth, theme: t, dark, themeMode, setThemeMode }) {
      const [state, actions] = useStore(user);
      const [tab, setTab] = useState("now");
      const [picker, setPicker] = useState(false);
      const [menu, setMenu] = useState(false);

      const [now, setNow] = useState(Date.now());
      useEffect(() => {
        if (!state.timer.startedAt) return;
        const id = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(id);
      }, [state.timer.startedAt]);

      useEffect(() => {
        if (state.timer.startedAt) {
          const project = state.projects.find((p) => p.id === state.timer.projectId);
          document.title = `${fmtHMS(now - state.timer.startedAt)} · ${project?.name || "Tracking"}`;
        } else {
          document.title = "Time Tracker";
        }
      }, [now, state.timer.startedAt, state.timer.projectId, state.projects]);

      if (!state.loaded) return <LoadingScreen theme={t} />;

      return (
        <div style={{
          minHeight: "100vh", background: t.bg, color: t.text,
          display: "flex", justifyContent: "center",
          padding: "24px 16px 100px",
        }}>
          <div style={{ width: "100%", maxWidth: 460 }}>
            {/* App bar */}
            <div style={{
              display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: "0 4px 18px", position: "relative",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ width: 10, height: 10, borderRadius: 2, background: t.accent }} />
                <span style={{ fontSize: 13, fontWeight: 600 }}>Time Tracker</span>
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => setThemeMode(dark ? "light" : "dark")} style={iconBtn(t)} title="Toggle theme">
                  {dark ? (
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><circle cx="7" cy="7" r="3"/><g stroke="currentColor" strokeWidth="1.2"><path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.5 2.5l1 1M10.5 10.5l1 1M2.5 11.5l1-1M10.5 3.5l1-1"/></g></svg>
                  ) : (
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M11 8.5A4.5 4.5 0 0 1 5.5 3a4 4 0 0 0-1.5 3.1A4.5 4.5 0 0 0 8.5 11a4 4 0 0 0 3.1-1.5 4.5 4.5 0 0 1-.6-1z"/></svg>
                  )}
                </button>
                <button onClick={() => setMenu((v) => !v)} style={iconBtn(t)} title="Account">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="7" cy="5" r="2.2"/><path d="M2.5 12c.5-2.2 2.4-3.5 4.5-3.5s4 1.3 4.5 3.5"/></svg>
                </button>
                {menu && (
                  <div style={{
                    position: "absolute", top: 38, right: 0, zIndex: 100,
                    background: t.paper, border: `1px solid ${t.line}`,
                    borderRadius: 10, padding: 6, minWidth: 200,
                    boxShadow: "0 8px 24px rgba(0,0,0,0.15)",
                  }}>
                    <div style={{ padding: "8px 10px", borderBottom: `1px solid ${t.line}`, marginBottom: 4 }}>
                      <div style={{ fontSize: 11, color: t.muted, letterSpacing: "0.05em" }}>Signed in as</div>
                      <div style={{ fontSize: 12, fontWeight: 500, marginTop: 2, overflow: "hidden", textOverflow: "ellipsis" }}>{user.email}</div>
                    </div>
                    <button onClick={() => { setMenu(false); auth.signOut(); }} style={{
                      width: "100%", textAlign: "left", padding: "8px 10px",
                      border: "none", background: "transparent", color: t.text,
                      fontSize: 13, cursor: "pointer", borderRadius: 6, fontFamily: "inherit",
                    }}>Sign out</button>
                  </div>
                )}
              </div>
            </div>

            {state.error && (
              <div style={{
                background: "#fee", color: "#a22", border: "1px solid #fcc",
                borderRadius: 10, padding: "10px 14px", marginBottom: 12,
                fontSize: 12, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8,
              }}>
                <span>{state.error}</span>
                <button onClick={actions.clearError} style={{ border: "none", background: "transparent", color: "#a22", cursor: "pointer", fontSize: 16 }}>×</button>
              </div>
            )}

            {tab === "now" && <NowView state={state} actions={actions} theme={t} now={now} onSwitchProject={() => setPicker(true)} />}
            {tab === "projects" && <ProjectsView state={state} actions={actions} theme={t} />}
            {tab === "history" && <HistoryView state={state} actions={actions} theme={t} />}

            {picker && <ProjectPicker state={state} actions={actions} theme={t} onClose={() => setPicker(false)} />}
          </div>

          <div style={{
            position: "fixed", bottom: 16, left: "50%", transform: "translateX(-50%)",
            display: "flex", gap: 4,
            background: dark ? "rgba(28,28,30,0.85)" : "rgba(250,250,247,0.85)",
            backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
            border: `1px solid ${t.line}`, borderRadius: 999, padding: 4,
            boxShadow: "0 8px 30px rgba(0,0,0,0.15)", zIndex: 50,
          }}>
            {[
              { id: "now", label: "Now" },
              { id: "projects", label: "Projects" },
              { id: "history", label: "History" },
            ].map((tb) => {
              const active = tab === tb.id;
              return (
                <button key={tb.id} onClick={() => setTab(tb.id)} style={{
                  border: "none",
                  background: active ? t.ink : "transparent",
                  color: active ? t.onInk : t.subtle,
                  padding: "8px 18px", borderRadius: 999,
                  fontSize: 13, fontWeight: 500,
                  cursor: "pointer", fontFamily: "inherit",
                }}>{tb.label}</button>
              );
            })}
          </div>
        </div>
      );
    }

    function iconBtn(t) {
      return {
        width: 32, height: 32, borderRadius: 8, border: `1px solid ${t.line}`,
        background: "transparent", color: t.text, cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center",
      };
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
